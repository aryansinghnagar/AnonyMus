name: CI

on:
  push:
    branches: [ main, p2p ]
  pull_request:
    branches: [ main, p2p ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run app_p2p tests
      run: |
        python -m unittest discover app_p2p/tests

    - name: Run JS crypto tests
      run: |
        node app_p2p/tests/test_crypto.js
