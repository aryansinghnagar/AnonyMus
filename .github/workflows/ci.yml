name: Unified CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Check Rust Formatting & Clippy
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
        working-directory: core/rust

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Linters
        run: pip install ruff

      - name: Check Python Linting & Formatting
        run: ruff check .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Biome Linter
        run: npm install -g @biomejs/biome

      - name: Check Web Formatting & Linting
        run: biome check ./src
        working-directory: web

  test-rust-core:
    name: Test Rust Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run Core Cargo Tests
        run: cargo test --all-features
        working-directory: core/rust

  test-python-backend:
    name: Test Python Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip install --system -r requirements.txt

      - name: Run Pytest
        run: python tests/run_tests.py

  test-web-client:
    name: Test Web Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install
        working-directory: web

      - name: Run Vitest Unit Tests
        run: npm run test
        working-directory: web

  test-android-app:
    name: Test Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew
        working-directory: android

      - name: Run Android Unit Tests
        run: ./gradlew testDebugUnitTest
        working-directory: android
