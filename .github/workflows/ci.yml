name: Unified CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch: {}
  workflow_call: {}

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Check Rust Formatting & Clippy
        run: |
          cargo fmt --all -- --check
          cargo clippy -- -D warnings
        working-directory: core/rust

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install Python Linters
        run: pip install ruff

      - name: Check Python Linting & Formatting
        run: ruff check .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Biome Linter
        run: npm install -g @biomejs/biome

      - name: Check Web Formatting & Linting
        run: biome format ./src
        working-directory: web

  test-rust-core:
    name: Test Rust Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run Core Cargo Tests
        run: cargo test
        working-directory: core/rust

  test-python-backend:
    name: Test Python Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv pytest pytest-asyncio httpx pydantic-settings structlog prometheus-client sentry-sdk bcrypt itsdangerous aiosqlite sqlalchemy
          uv pip install --system -r requirements.txt

      - name: Run Pytest
        run: pytest tests/unit/ tests/integration/ -m "not legacy"

  test-web-client:
    name: Test Web Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci
        working-directory: web

      - name: Run Vitest Unit Tests
        run: npm run test
        working-directory: web

  test-android-app:
    name: Test Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Preflight Check
        id: check
        run: bash scripts/ci-preflight.sh android --optional

      - name: Set up JDK 17
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Grant Execute Permission to Gradlew
        if: steps.check.outputs.skip != 'true'
        run: chmod +x gradlew
        working-directory: android

      - name: Run Android Unit Tests
        if: steps.check.outputs.skip != 'true'
        run: ./gradlew compileDebugKotlin testDebugUnitTest
        working-directory: android
