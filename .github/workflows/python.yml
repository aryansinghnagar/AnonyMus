name: Python Code Quality & Testing

on:
  push:
    branches: [main]
    paths: ['**/*.py', 'requirements.txt', '.github/workflows/python.yml']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
      - name: Preflight Check
        id: check
        run: bash scripts/ci-preflight.sh python

  test:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv and dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          $HOME/.local/bin/uv pip install --system -r requirements.txt
          $HOME/.local/bin/uv pip install --system ruff pyright pytest pytest-cov

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Ruff Formatter
        run: ruff format --check .

      - name: Run Pyright Type Checker
        run: pyright

      - name: Run Test Suite
        run: pytest --cov=core --cov=transports --cov-report=xml

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false
