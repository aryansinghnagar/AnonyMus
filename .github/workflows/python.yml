name: Python Code Quality & Testing

on:
  push:
    branches: [main, dev]
    paths: ['**/*.py', 'requirements*.txt', 'requirements*.in', '.github/workflows/python.yml']
  pull_request:
    branches: [main, dev]
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
      - name: Preflight Check
        id: check
        run: bash scripts/ci-preflight.sh python --optional

  test:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv and dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          uv pip install --system -r requirements.txt
          uv pip install --system ruff pyright pytest pytest-cov

      - name: Install v3 stack dependencies
        run: |
          uv pip install --system \
            "fastapi[standard]>=0.115" \
            "aiosqlite>=0.20" \
            "sqlalchemy>=2.0.36" \
            "pytest-asyncio>=0.24" \
            "httpx>=0.28" \
            "pydantic-settings>=2.6" \
            "structlog>=24.4" \
            "prometheus-client>=0.21" \
            "sentry-sdk[fastapi]>=2.0" \
            "bcrypt>=4.0" \
            "itsdangerous>=2.2"

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Ruff Formatter
        run: ruff format --check .

      - name: Run Pyright Type Checker
        run: pyright || true

      - name: Run Unit & Integration Test Suite
        run: pytest tests/unit/ tests/integration/ --cov=core --cov=transports --cov-report=xml -m "not legacy"

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false
