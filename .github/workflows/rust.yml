name: Rust Core Validation

on:
  push:
    branches: [main, dev]
    paths: ['core/rust/**', 'Cargo.toml', '.github/workflows/rust.yml']
  pull_request:
    branches: [main, dev]
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v7
      - name: Preflight Check
        id: check
        run: bash scripts/ci-preflight.sh rust

  validate:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: core/rust
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Format Check
        run: cargo fmt --check

      - name: Cargo Clippy
        run: cargo clippy -- -D warnings

      - name: Cargo Test
        run: cargo test
