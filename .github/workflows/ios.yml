name: iOS App Validation

on:
  push:
    branches: [main]
    paths: ['ios/**', '.github/workflows/ios.yml']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v7
      - name: Preflight Check
        id: check
        run: bash scripts/ci-preflight.sh ios

  build:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Xcode Select
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: iOS Build Test
        run: echo "iOS validation placeholder"
