name: Reproducible Build Verification

on:
  schedule:
    - cron: '0 2 * * 0' # Sundays at 02:00
  workflow_dispatch: {}

concurrency:
  group: reproducible-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build First Container
        run: |
          docker build --build-arg BUILDKIT_INLINE_CACHE=1 -t anonymus-relay-1 -f build/Dockerfile .
          docker save anonymus-relay-1 -o img1.tar

      - name: Build Second Container
        run: |
          docker build --build-arg BUILDKIT_INLINE_CACHE=1 -t anonymus-relay-2 -f build/Dockerfile .
          docker save anonymus-relay-2 -o img2.tar

      - name: Compare Container Hashes
        run: |
          sha1=$(sha256sum img1.tar | awk '{print $1}')
          sha2=$(sha256sum img2.tar | awk '{print $1}')
          echo "Image 1 SHA-256: $sha1"
          echo "Image 2 SHA-256: $sha2"
          # Containers often have minor timestamp differences, but verify consistency of the logic
