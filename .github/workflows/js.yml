name: JavaScript Code Quality & Testing

on:
  push:
    branches: [main]
    paths: ['web/**', 'packages/typescript-sdk/**', '.github/workflows/js.yml']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: js-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v7
      - name: Preflight Check
        id: check
        run: bash scripts/ci-preflight.sh js

  test:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and compile
        run: |
          if [ -d "packages/typescript-sdk" ]; then
            cd packages/typescript-sdk
            npm ci
            npm run build
          fi
