[package]
name = "anonymus-desktop"
version = "1.0.0"
description = "AnonyMus Desktop Client Wrapper"
authors = ["AnonyMus Developers"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
tauri = { version = "1.6", features = ["api-all"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[features]
# by default we use the debug_assertions flag to enable devtools on untrusted/dev builds
default = [ "custom-protocol" ]
custom-protocol = [ "tauri/custom-protocol" ]
