[package]
name = "anonymus-desktop"
version = "3.0.0"
description = "AnonyMus Desktop Client Wrapper"
authors = ["AnonyMus Developers"]
edition = "2021"

[build-dependencies]
tauri-build = "2.0.3"

[dependencies]
tauri = { version = "2.1.1", features = [] }
tauri-plugin-shell = "2.0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anonymus-core = { path = "../../../core/rust" }

[features]
default = [ "custom-protocol" ]
custom-protocol = [ "tauri/custom-protocol" ]
