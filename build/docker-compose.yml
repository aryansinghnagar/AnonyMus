version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://anonymus:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/anonymus_db
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=anonymus
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=anonymus_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

volumes:
  pgdata:
